name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env
        run: |
          cat > .env << EOF
          FACE_API_URL=${{ secrets.FACE_API_URL }}
          STT_API_URL=${{ secrets.STT_API_URL }}
          TTS_API_URL=${{ secrets.TTS_API_URL }}
          LLM_API_URL=${{ secrets.LLM_API_URL }}
          LLM_API_KEY=${{ secrets.LLM_API_KEY }}
          DIFY_API_URL=${{ secrets.DIFY_API_URL }}
          DIFY_API_KEY=${{ secrets.DIFY_API_KEY }}
          EOF

      - name: Build & Package
        run: npm run dist -- --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: release/*.dmg
          retention-days: 7

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-win:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env
        shell: pwsh
        run: |
          @"
          FACE_API_URL=${{ secrets.FACE_API_URL }}
          STT_API_URL=${{ secrets.STT_API_URL }}
          TTS_API_URL=${{ secrets.TTS_API_URL }}
          LLM_API_URL=${{ secrets.LLM_API_URL }}
          LLM_API_KEY=${{ secrets.LLM_API_KEY }}
          DIFY_API_URL=${{ secrets.DIFY_API_URL }}
          DIFY_API_KEY=${{ secrets.DIFY_API_KEY }}
          "@ | Out-File -FilePath .env -Encoding utf8

      - name: Build & Package
        run: npm run dist -- --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: release/*.exe
          retention-days: 7

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
