spring:
  profiles:
    active: dev
  application:
    name: cabinet-ledger

server:
  port: 8080
  servlet:
    context-path: /api

mybatis:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.cabinet.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.cabinet: debug
    org.mybatis: debug

cabinet-ledger:
  weight-change-threshold: 5
  hardware-door-control-enabled: false
