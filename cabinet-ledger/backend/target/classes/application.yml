spring:
  profiles:
    active: dev
  application:
    name: cabinet-ledger

server:
  port: 8080
  servlet:
    context-path: /api

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.cabinet: debug
    com.baomidou.mybatisplus: debug

cabinet-ledger:
  weight-change-threshold: 5
  hardware-door-control-enabled: false
